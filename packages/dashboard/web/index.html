<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>codingverse · observe</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  </head>
  <body>
    <header>
      <h1>codingverse <span class="mode">observe</span></h1>
      <div id="repo" class="repo"></div>
    </header>

    <main>
      <section class="board" id="board-overview">
        <h2>① Index overview</h2>
        <div id="cards" class="cards"></div>
        <div class="split">
          <div id="health" class="panel"></div>
          <div id="languages" class="panel"></div>
        </div>
      </section>

      <section class="board" id="board-tokenmap">
        <h2>② Token map</h2>
        <div id="treemap" class="treemap"></div>
      </section>

      <section class="board" id="board-sync">
        <h2>⑥ Sync status</h2>
        <div id="sync"></div>
      </section>

      <section class="board" id="board-graph">
        <h2>③ Code graph</h2>
        <div class="graph-controls">
          <span id="graph-meta" class="muted"></span>
          <button id="graph-reset" type="button">clear highlight</button>
        </div>
        <div id="graph" class="graph"></div>
        <div id="graph-detail" class="graph-detail muted">Click a node to highlight its callers (blue) and callees (orange).</div>
      </section>
      <section class="board" id="board-search">
        <h2>④ Search inspector</h2>
        <div class="search-controls">
          <input id="search-input" type="text" placeholder="query (e.g. token budget)" />
          <button id="search-run" type="button">search</button>
          <span id="search-meta" class="muted"></span>
        </div>
        <div id="search-cols" class="search-cols">
          <div class="search-col"><h3>BM25</h3><div id="search-bm25" class="hit-list"></div></div>
          <div class="search-col"><h3>Co-location</h3><div id="search-graph" class="hit-list"></div></div>
          <div class="search-col"><h3>Fused (RRF)</h3><div id="search-fused" class="hit-list"></div></div>
        </div>
      </section>
      <section class="board" id="board-pack">
        <h2>⑤ Pack preview</h2>
        <div class="pack-controls">
          <label class="pack-label">Budget
            <input id="pack-budget" type="range" min="2000" max="50000" step="1000" value="10000" />
            <span id="pack-budget-val">10,000 tok</span>
          </label>
          <label class="pack-label">Strategy
            <select id="pack-strategy">
              <option value="auto">auto</option>
              <option value="full">full</option>
              <option value="skeleton">skeleton</option>
              <option value="outline">outline</option>
            </select>
          </label>
          <button id="pack-run" type="button">preview</button>
          <span id="pack-meta" class="muted"></span>
        </div>
        <div id="pack-result"></div>
      </section>
    </main>

    <div id="error" class="error" hidden></div>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
